<!-- ====================================================================
     DreamLife Community-Chat — Einbett-Code für Learning Suite
     --------------------------------------------------------------------
     Diesen kompletten Block in ein "Custom Code / HTML"-Widget in
     Learning Suite einfügen.

     Zieht automatisch aus dem Mitgliederprofil:
       - Nutzer-ID    (system.user.id)        -> Login (ohne ID kein Zugang)
       - Vorname      (system.user.firstName) -> Begrüßung & Name
       - Nachname     (system.user.lastName)
       - Dienstleistung (dienstleistung)
       - Methode        (methode)
       - Zielgruppe/Branche (zielgruppe-branche)
       - Angebotssatz   (angebotssatz)
     Die Business-Felder landen im Profil und stehen jeder KI der App
     für persönlichere Vorschläge zur Verfügung.

     Es werden automatisch beide Wege probiert: erst die JS-API,
     dann der Text-Platzhalter. Höhe unten bei --chat-height anpassen.
     ==================================================================== -->

<div id="dl-chat-mount" style="--chat-height:85vh;width:100%;height:var(--chat-height);min-height:560px;"></div>

<script>
(function () {
  // Wert aus Learning Suite holen: erst JS-API, dann Text-Platzhalter.
  function ls(apiKey, tplValue) {
    try {
      if (typeof customFields !== "undefined" &&
          typeof customFields.getFieldValue === "function") {
        var v = customFields.getFieldValue(apiKey);
        if (v && String(v).trim()) return String(v).trim();
      }
    } catch (e) {}
    // Platzhalter nur nehmen, wenn LS ihn ersetzt hat (kein {{...}} / [[...]] mehr).
    if (tplValue && !/^\{\{.*\}\}$/.test(tplValue) && !/^\[\[.*\]\]$/.test(tplValue)) {
      return String(tplValue).trim();
    }
    return "";
  }

  var uid   = ls("system.user.id",        "{{system.user.id}}");
  var first = ls("system.user.firstName",  "{{system.user.firstName}}");
  var last  = ls("system.user.lastName",   "{{system.user.lastName}}");
  var dienstleistung = ls("dienstleistung",     "{{dienstleistung}}");
  var methode        = ls("methode",            "{{methode}}");
  var zielgruppe     = ls("zielgruppe-branche", "{{zielgruppe-branche}}");
  var angebotssatz   = ls("angebotssatz",       "{{angebotssatz}}");

  // Chat-URL mit allen Parametern bauen (alles URL-codiert).
  var BASE = "https://dreamlife-chat.netlify.app/";
  var qs =
      "?uid="            + encodeURIComponent(uid) +
      "&first="          + encodeURIComponent(first) +
      "&last="           + encodeURIComponent(last) +
      "&dienstleistung=" + encodeURIComponent(dienstleistung) +
      "&methode="        + encodeURIComponent(methode) +
      "&zielgruppe-branche=" + encodeURIComponent(zielgruppe) +
      "&angebotssatz="   + encodeURIComponent(angebotssatz);

  var mount = document.getElementById("dl-chat-mount");
  var ifr = document.createElement("iframe");
  ifr.src = BASE + qs;
  ifr.setAttribute("allow", "clipboard-write; camera; microphone");
  ifr.style.cssText = "width:100%;height:100%;border:0;display:block;border-radius:16px;";
  mount.innerHTML = "";
  mount.appendChild(ifr);
})();
</script>
